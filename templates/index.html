<!DOCTYPE html>
<html>
<head>
  <title>Log Analyzer Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>📊 Log Analyzer Dashboard</h1>

  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="logfile" required>
    <button type="submit">Analyze</button>
  </form>

  {% if result %}
    <h2>Results:</h2>
    <ul>
      <li>ERROR: {{ result.ERROR }}</li>
      <li>WARNING: {{ result.WARNING }}</li>
      <li>INFO: {{ result.INFO }}</li>
    </ul>

    <canvas id="chart" width="250" height="150"></canvas>

    <script>
      const data = {
        labels: ["ERROR", "WARNING", "INFO"],
        datasets: [{
          label: "Log Count",
          data: [{{ result.ERROR }}, {{ result.WARNING }}, {{ result.INFO }}],
          backgroundColor: ["red", "orange", "green"]
        }]
      };

      new Chart(document.getElementById("chart"), {
        type: "bar",
        data: data
      });
    </script>
  {% endif %}
</body>
</html>
